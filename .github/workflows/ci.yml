name: CI
on: 
  pull_request:
  push:
    branches: 
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.1
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeCheck
        run: pnpm -F tubesize run tsc
      
      - name: Run Tests
        run: pnpm -F tubesize run test

      - name: Build
        run: pnpm -F tubesize run build
