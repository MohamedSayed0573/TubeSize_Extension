name: Release
permissions:
    contents: write
on:
    push:
        tags:
            - "extension-v*.*.*"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10.30.3

            - name: Set up Node.js
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --filter tubesize

            - name: TypeCheck
              run: pnpm -F tubesize run tsc

            - name: Lint
              run: pnpm -F tubesize run lint

            - name: Knip
              run: pnpm -F tubesize run knip

            - name: Run Tests
              run: pnpm --filter tubesize run test

            - name: Build release packages
              run: |
                  pnpm --filter tubesize run pack:firefox
                  pnpm --filter tubesize run pack

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      tubesize/dist/tubesize.zip
                      tubesize/dist_firefox/tubesize_firefox.zip
                  generate_release_notes: true
